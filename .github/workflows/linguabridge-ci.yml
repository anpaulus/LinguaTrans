# ════════════════════════════════════════════════════════════════════════════
# LinguaBridge — GitHub Actions CI
# Runner    : macos-15  (Xcode 16.x, iOS 18 SDK — stable and available)
# Target    : iOS 18.0, iPhone only (TARGETED_DEVICE_FAMILY = 1)
# Signing   : disabled (personal Apple ID, install via Xcode ⌘R)
#
# Root causes fixed vs previous iterations:
#   1. Runner: macos-26 unavailable → use macos-15 (Xcode 16.x, iOS 18 SDK)
#   2. Scheme BlueprintIdentifier was "LinguaBridge" (name) instead of the
#      UUID "5E716D0B2FA107CB00A0BEC1" → xcodebuild couldn't resolve the
#      target → "Supported platforms empty" → exit code 70
#   3. project.pbxproj: missing INFOPLIST_FILE, ENABLE_APP_SANDBOX on iOS,
#      duplicate SDKROOT keys, GENERATE_INFOPLIST_FILE = YES in Release
#   4. actions/checkout@v5, upload-artifact@v5 don't exist → use @v4
#   5. Hardcoded XCODE_PATH for Xcode 26 wrong on macos-15
#
# Action versions (all first-party, confirmed stable):
#   actions/checkout@v4         ✅ latest stable
#   actions/cache@v4            ✅ latest stable (no v5 exists)
#   actions/upload-artifact@v4  ✅ latest stable
#
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: silences Node 20 deprecation warning
# ════════════════════════════════════════════════════════════════════════════

name: LinguaBridge CI

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.swift'
      - '**.plist'
      - '**.xcodeproj/**'
      - '.github/workflows/**'

  pull_request:
    branches: [ main ]
    paths:
      - '**.swift'
      - '**.plist'
      - '**.xcodeproj/**'

  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run unit tests after build'
        type: boolean
        default: true
      log_level:
        description: 'xcodebuild log verbosity'
        type: choice
        default: quiet
        options: [ quiet, verbose ]

# ── Global env ────────────────────────────────────────────────────────────────
env:
  PROJECT:      LinguaBridge.xcodeproj
  SCHEME:       LinguaBridge
  DERIVED_DATA: ${{ github.workspace }}/DerivedData
  # Node 24 opt-in — silences deprecation warning (mandatory before Sep 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
# JOB 1 — LINT
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  lint:
    name: "🔍 Lint & Validate"
    runs-on: macos-15          # ← Xcode 16.x, iOS 18 SDK, stable runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Discover and select the newest Xcode 16.x on this runner
      - name: Select Xcode 16
        run: |
          echo "── Available Xcode installations ──"
          ls /Applications | grep Xcode || true
          # Pick newest Xcode 16.x, fall back to system default
          XCODE_APP=$(ls /Applications | grep -E "^Xcode_16" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
            echo "Selected: $XCODE_APP"
          else
            echo "Using default Xcode: $(xcode-select -p)"
          fi
          echo ""
          xcodebuild -version
          swift --version

      # Verify the scheme BlueprintIdentifier matches the pbxproj UUID
      - name: Verify scheme BlueprintIdentifier
        run: |
          SCHEME_FILE="LinguaBridge.xcodeproj/xcshareddata/xcschemes/LinguaBridge.xcscheme"
          TARGET_UUID="5E716D0B2FA107CB00A0BEC1"
          echo "── Checking scheme BlueprintIdentifier ──"
          if grep -q "BlueprintIdentifier = \"$TARGET_UUID\"" "$SCHEME_FILE"; then
            echo "  ✓ BlueprintIdentifier = $TARGET_UUID"
          else
            echo "  ✗ BlueprintIdentifier is NOT the correct UUID!"
            echo "    Found:"
            grep "BlueprintIdentifier" "$SCHEME_FILE" | head -3
            echo ""
            echo "❌ Fix: set BlueprintIdentifier to $TARGET_UUID in the scheme file."
            exit 1
          fi

      - name: Check required source files
        run: |
          echo "── Checking required source files ──"
          FILES=(
            "LinguaBridge/LinguaBridgeApp.swift"
            "LinguaBridge/ContentView.swift"
            "LinguaBridge/TranslationManager.swift"
            "LinguaBridge/MultipeerManager.swift"
            "LinguaBridge/SpeechManager.swift"
            "LinguaBridge/TTSManager.swift"
            "LinguaBridge/Info.plist"
            "LinguaBridge/Assets.xcassets/Contents.json"
          )
          MISSING=0
          for F in "${FILES[@]}"; do
            if [ -f "$F" ]; then echo "  ✓  $F"
            else echo "  ✗  MISSING: $F"; MISSING=$((MISSING+1)); fi
          done
          [ "$MISSING" -eq 0 ] || { echo ""; echo "❌ $MISSING file(s) missing."; exit 1; }
          echo ""; echo "✅ All source files present."

      - name: Validate Info.plist keys
        run: |
          echo "── Checking Info.plist permission keys ──"
          PLIST="LinguaBridge/Info.plist"
          KEYS=(
            NSMicrophoneUsageDescription
            NSSpeechRecognitionUsageDescription
            NSLocalNetworkUsageDescription
            NSBonjourServices
          )
          MISSING=0
          for K in "${KEYS[@]}"; do
            if /usr/libexec/PlistBuddy -c "Print :$K" "$PLIST" &>/dev/null
            then echo "  ✓  $K"
            else echo "  ✗  MISSING: $K"; MISSING=$((MISSING+1)); fi
          done
          [ "$MISSING" -eq 0 ] || { echo ""; echo "❌ $MISSING key(s) missing."; exit 1; }
          echo ""; echo "✅ Info.plist valid."

      - name: Swift syntax check
        run: |
          echo "── Swift syntax check ──"
          ERRORS=0
          while IFS= read -r FILE; do
            OUTPUT=$(swiftc -parse "$FILE" 2>&1 || true)
            if echo "$OUTPUT" | grep -q "error:"; then
              echo "  ✗  $FILE"; echo "$OUTPUT" | grep "error:" | head -3
              ERRORS=$((ERRORS+1))
            else
              echo "  ✓  $FILE"
            fi
          done < <(find LinguaBridge -name "*.swift" | sort)
          [ "$ERRORS" -eq 0 ] || { echo ""; echo "❌ $ERRORS file(s) have errors."; exit 1; }
          echo ""; echo "✅ All Swift files valid."

      # Show what destinations are actually available — useful for debugging
      - name: Show available destinations
        run: |
          echo "── Destinations for scheme '$SCHEME' ──"
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -showdestinations 2>&1 \
            | grep -E "platform:|name:|error:|Ineligible" | head -20 | sed 's/^/  /' || true

# ══════════════════════════════════════════════════════════════════════════════
# JOB 2 — BUILD & TEST
# ══════════════════════════════════════════════════════════════════════════════
  build-test:
    name: "🔨 Build & Test"
    runs-on: macos-15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_APP=$(ls /Applications | grep -E "^Xcode_16" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP/Contents/Developer"
          fi
          xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: dd-macos15-${{ hashFiles('**/*.swift', '**/project.pbxproj') }}
          restore-keys: dd-macos15-

      # ── Build ─────────────────────────────────────────────────────────────
      # -sdk iphonesimulator     → compile against the iOS Simulator SDK
      # generic/platform=iOS Simulator → no concrete device/runtime needed
      # CODE_SIGNING_ALLOWED=NO → skip all signing (personal use)
      # GENERATE_INFOPLIST_FILE=NO → use our hand-written Info.plist
      - name: Build
        run: |
          VERBOSITY="${{ github.event.inputs.log_level || 'quiet' }}"
          echo "── Building LinguaBridge ──"
          echo "   runner      : macos-15 (Xcode 16)"
          echo "   sdk         : iphonesimulator"
          echo "   destination : generic/platform=iOS Simulator"
          echo "   signing     : disabled"
          echo ""
          set -o pipefail
          xcodebuild build \
            -project         "$PROJECT" \
            -scheme          "$SCHEME"  \
            -sdk              iphonesimulator \
            -destination     "generic/platform=iOS Simulator" \
            -derivedDataPath "$DERIVED_DATA" \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY=""    \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO  \
            ENABLE_TESTABILITY=YES   \
            GENERATE_INFOPLIST_FILE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            -"$VERBOSITY" 2>&1 | tee /tmp/build.log
          RESULT=${PIPESTATUS[0]}
          if [ "$RESULT" -ne 0 ]; then
            echo ""; echo "── Build failed. Last 80 lines ──"
            tail -80 /tmp/build.log
            exit 1
          fi
          echo ""; echo "✅ Build succeeded."

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Run unit tests
        if: ${{ github.event.inputs.run_tests != 'false' }}
        run: |
          mkdir -p test-results
          echo "── Running unit tests ──"
          set -o pipefail
          xcodebuild test \
            -project          "$PROJECT" \
            -scheme           "$SCHEME"  \
            -sdk               iphonesimulator \
            -destination      "platform=iOS Simulator,name=Any iOS Simulator Device" \
            -derivedDataPath  "$DERIVED_DATA" \
            -resultBundlePath test-results/LinguaBridge.xcresult \
            CODE_SIGN_IDENTITY=""    \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO  \
            GENERATE_INFOPLIST_FILE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            -quiet 2>&1 | tee /tmp/test.log
          RESULT=${PIPESTATUS[0]}
          if [ "$RESULT" -ne 0 ]; then
            if grep -qE "no tests were executed|does not contain test" /tmp/test.log 2>/dev/null; then
              echo ""; echo "⚠️  No test targets — build passed, tests skipped."
            else
              tail -40 /tmp/test.log; exit 1
            fi
          else
            echo ""; echo "✅ Tests passed."
          fi

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 🏗️ LinguaBridge Build Summary"
            echo ""
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Run | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Runner | \`macos-15\` (Xcode 16) |"
            echo "| iOS deployment target | 18.0 |"
            echo "| Code signing | ❌ Disabled (personal use) |"
            echo "| IPA | ❌ Install via Xcode ⌘R on your Mac |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-run-${{ github.run_number }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
